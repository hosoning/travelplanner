<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>Travoo</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;background:#000;color:#fff;overscroll-behavior:none}

:root{
  --g0:rgba(255,255,255,.04);--g1:rgba(255,255,255,.07);--g2:rgba(255,255,255,.11);
  --g3:rgba(255,255,255,.17);--gb:rgba(255,255,255,.10);
  --gbl:blur(52px) saturate(200%) brightness(1.04);
  --gsh:0 8px 40px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.12);
  --t1:rgba(255,255,255,.95);--t2:rgba(255,255,255,.62);
  --t3:rgba(255,255,255,.35);--t4:rgba(255,255,255,.18);
  --blue:#0A84FF;--green:#30D158;--orange:#FF9F0A;--red:#FF453A;--purple:#BF5AF2;
  --r:20px;--r2:14px;--r3:10px;
  --sb:env(safe-area-inset-bottom,34px);
  --tabh:calc(62px + var(--sb));
  --sp:cubic-bezier(.34,1.56,.64,1);--sp2:cubic-bezier(.25,1.4,.5,1);
  --ease:cubic-bezier(.25,.46,.45,.94);
  --theme-accent:#ffffff;
}

/* ── WALLPAPER ──────────────────────────────────── */
#wp{position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 110% 50% at 20% 0%,rgba(210,165,95,.18) 0%,transparent 52%),
    radial-gradient(ellipse 80% 55% at 85% 100%,rgba(95,120,160,.15) 0%,transparent 52%),
    linear-gradient(158deg,#1a1610 0%,#111318 52%,#13100f 100%);
  transition:background .8s ease}
#wp.img{background-image:var(--wpi);background-size:cover;background-position:center}
#wp.img::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.5)}

/* ── APP ────────────────────────────────────────── */
#app{position:relative;z-index:1;height:100dvh;display:flex;flex-direction:column}

/* ── GLASS ──────────────────────────────────────── */
.g{background:var(--g1);backdrop-filter:var(--gbl);-webkit-backdrop-filter:var(--gbl);
  border:1px solid var(--gb);box-shadow:var(--gsh);position:relative}
.g::after{content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(180deg,rgba(255,255,255,.06) 0%,transparent 45%);
  pointer-events:none;z-index:0}
.g>*{position:relative;z-index:1}

/* ── VIEWS ──────────────────────────────────────── */
.view{display:none;flex:1;flex-direction:column;position:absolute;inset:0}
.view.active{display:flex;animation:vIn .38s var(--sp2) both}
@keyframes vIn{from{opacity:0;transform:scale(.96) translateY(14px)}to{opacity:1;transform:none}}
.scroller{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  padding-bottom:calc(var(--tabh) + 40px)}
.scroller::-webkit-scrollbar{display:none}

/* ── NAV ────────────────────────────────────────── */
.nav{flex-shrink:0;padding:6px 18px 8px;display:flex;align-items:center;gap:10px;position:relative;z-index:50}
.nav-title{font-size:17px;font-weight:600;position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap;pointer-events:none}
.nav-large{font-size:32px;font-weight:700;letter-spacing:-.5px;flex:1}
.nbtn{width:34px;height:34px;border-radius:50%;background:var(--g1);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--gb);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);flex-shrink:0;transition:all .2s var(--sp)}
.nbtn:active{transform:scale(.78);background:var(--g3)}
.nbtn svg{width:18px;height:18px}
.nbtn svg path,.nbtn svg polyline,.nbtn svg circle,.nbtn svg rect,.nbtn svg line{stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ── TABS ───────────────────────────────────────── */
.tabs{position:fixed;bottom:0;left:0;right:0;z-index:200;display:grid;grid-template-columns:1fr 1fr 70px 1fr 1fr;align-items:center;padding:6px 4px;padding-bottom:max(env(safe-area-inset-bottom,6px),6px);background:rgba(0,0,0,.35);backdrop-filter:blur(44px) saturate(180%);-webkit-backdrop-filter:blur(44px) saturate(180%);border-top:1px solid rgba(255,255,255,.06)}
.tab{display:flex;align-items:center;justify-content:center;height:46px;cursor:pointer;transition:all .22s var(--sp)}
.tab:active{transform:scale(.78)}
.tab svg{width:24px;height:24px;transition:all .25s var(--sp);opacity:.38}
.tab svg path,.tab svg rect,.tab svg circle,.tab svg line,.tab svg polyline,.tab svg polygon{stroke:white;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tab.on svg{opacity:1;filter:drop-shadow(0 0 7px rgba(255,255,255,.55))}
.tab-home{width:54px;height:54px;border-radius:50%;margin:0 auto;background:var(--g3);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.28);box-shadow:0 4px 22px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.22);transition:all .25s var(--sp)}
.tab-home:active{transform:scale(.86)}
.tab-home.on{background:rgba(255,255,255,.22);box-shadow:0 4px 28px rgba(255,255,255,.22),inset 0 1px 0 rgba(255,255,255,.45)}
.tab-home svg{opacity:1!important}

/* ── BUTTONS ────────────────────────────────────── */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;border-radius:var(--r2);font-size:16px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .18s var(--sp)}
.btn:active{transform:scale(.93);opacity:.85}
.btn:disabled{opacity:.4;pointer-events:none}
.btn-full{width:100%}
.btn-p{background:#fff;color:#000;box-shadow:0 4px 22px rgba(255,255,255,.18)}
.btn-p:active{background:rgba(255,255,255,.88)}
.btn-g{background:var(--g2);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--gb);color:var(--t1)}
.btn-g:active{background:var(--g3)}
.btn-d{background:rgba(255,69,58,.18);border:1px solid rgba(255,69,58,.3);color:var(--red)}
.btn svg{width:18px;height:18px;flex-shrink:0}
.btn svg path,.btn svg polyline,.btn svg line,.btn svg circle,.btn svg rect,.btn svg polygon{stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.btn-p svg path,.btn-p svg polyline{stroke:#000}

/* ── INPUT ──────────────────────────────────────── */
.inp{width:100%;padding:13px 15px;background:var(--g2);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--gb);border-radius:var(--r2);color:#fff;font-size:16px;font-family:inherit;outline:none;-webkit-appearance:none;appearance:none;transition:border-color .2s,box-shadow .2s}
.inp:focus{border-color:rgba(255,255,255,.38);box-shadow:0 0 0 3px rgba(255,255,255,.07)}
.inp::placeholder{color:var(--t4)}
.inp-lbl{font-size:12px;font-weight:600;color:var(--t3);margin-bottom:6px;letter-spacing:.4px;text-transform:uppercase}
select.inp{cursor:pointer}
select.inp option{background:#18181c;color:#fff}
textarea.inp{resize:none;min-height:80px}

/* ── SECTION / LIST ─────────────────────────────── */
.sec{padding:0 16px;margin-bottom:18px}
.sec-ttl{font-size:12px;font-weight:600;color:var(--t3);margin-bottom:8px;letter-spacing:.4px;text-transform:uppercase;padding-left:2px}
.list{border-radius:var(--r);overflow:hidden;background:var(--g1);backdrop-filter:var(--gbl);-webkit-backdrop-filter:var(--gbl);border:1px solid var(--gb)}
.lr{display:flex;align-items:center;gap:12px;padding:13px 15px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;transition:background .15s;min-height:48px}
.lr:last-child{border-bottom:none}
.lr:active{background:rgba(255,255,255,.06)}
.lr-lbl{flex:1;font-size:16px;color:var(--t1)}
.lr-val{font-size:14px;color:var(--t2)}
.lr-chev{opacity:.3}
.lr-chev svg{width:16px;height:16px}
.lr-chev svg path{stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── CHIP ───────────────────────────────────────── */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:7px 16px;background:var(--g1);border:1px solid var(--gb);border-radius:20px;font-size:14px;font-weight:500;cursor:pointer;color:var(--t2);transition:all .18s var(--sp)}
.chip.on{background:#fff;color:#000;border-color:transparent}
.chip:active{transform:scale(.88)}

/* ── MODAL ──────────────────────────────────────── */
.ov{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;align-items:flex-end;justify-content:center;animation:ovIn .22s ease both}
@keyframes ovIn{from{opacity:0}to{opacity:1}}
.sheet{width:100%;max-width:560px;background:rgba(20,20,26,.94);backdrop-filter:blur(52px) saturate(200%);-webkit-backdrop-filter:blur(52px) saturate(200%);border:1px solid rgba(255,255,255,.1);border-bottom:none;border-radius:var(--r) var(--r) 0 0;padding:18px 18px;padding-bottom:max(calc(env(safe-area-inset-bottom,0px)+22px),22px);max-height:92vh;overflow-y:auto;animation:sheetUp .42s var(--sp2) both;box-shadow:0 -4px 60px rgba(0,0,0,.65),inset 0 1px 0 rgba(255,255,255,.1)}
.sheet::-webkit-scrollbar{display:none}
@keyframes sheetUp{from{transform:translateY(100%);opacity:0}to{transform:none;opacity:1}}
.sh{width:34px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 18px}

/* ── ONBOARDING ─────────────────────────────────── */
.ob{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:90px 32px 74px}
.ob-form{width:100%;max-width:400px}
.ob-logo{width:96px;height:96px;border-radius:26px;background:linear-gradient(145deg,rgba(255,255,255,.13),rgba(255,255,255,.04));border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;box-shadow:0 20px 60px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.18);animation:float 4s ease-in-out infinite;margin-bottom:22px}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-9px) rotate(.8deg)}}
.ob-logo svg{width:52px;height:52px}
.ob-logo svg path,.ob-logo svg circle,.ob-logo svg line,.ob-logo svg polyline{stroke:white;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.ob-brand{font-size:40px;font-weight:700;letter-spacing:-1px;margin-bottom:6px}
.ob-sub{font-size:15px;color:var(--t2);margin-bottom:40px;text-align:center;line-height:1.55}
.ob-form{width:100%;display:flex;flex-direction:column;gap:12px}
.code-inp{width:100%;padding:18px;text-align:center;font-size:30px;font-weight:700;letter-spacing:10px;text-transform:uppercase;background:var(--g2);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--gb);border-radius:var(--r);color:#fff;font-family:inherit;outline:none;-webkit-appearance:none;appearance:none;transition:border-color .2s,box-shadow .2s}
.code-inp:focus{border-color:rgba(255,255,255,.4);box-shadow:0 0 0 4px rgba(255,255,255,.07)}
.ob-div{display:flex;align-items:center;gap:12px;color:var(--t4);font-size:13px;margin:2px 0}
.ob-div::before,.ob-div::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}

/* ── TRIP CARD ──────────────────────────────────── */
.tc{position:relative;border-radius:var(--r);overflow:hidden;cursor:pointer;margin-bottom:12px;min-height:96px;transition:transform .2s var(--sp),box-shadow .2s}
.tc:active{transform:scale(.96)}
.tc-bg{position:absolute;inset:0;background:var(--g2);backdrop-filter:var(--gbl);-webkit-backdrop-filter:var(--gbl);border:1px solid var(--gb)}
.tc-bg::before{content:'';position:absolute;top:0;left:0;right:0;height:55%;background:linear-gradient(180deg,rgba(255,255,255,.07),transparent);z-index:1}
.tc-body{position:relative;z-index:2;padding:16px}
.tc-name{font-size:20px;font-weight:700;margin-bottom:3px}
.tc-date{font-size:13px;color:var(--t2)}

/* ── HOME ───────────────────────────────────────── */
.hero{margin:0 16px 14px;border-radius:var(--r);background:var(--g1);backdrop-filter:var(--gbl);-webkit-backdrop-filter:var(--gbl);border:1px solid var(--gb);padding:18px;box-shadow:var(--gsh);overflow:hidden;position:relative}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.05),transparent);pointer-events:none}
.hero-inner{position:relative;z-index:1}
.hero-day{font-size:13px;font-weight:600;color:var(--t2);margin-bottom:4px}
.hero-title{font-size:24px;font-weight:700;letter-spacing:-.4px;margin-bottom:8px}
.hero-prog{height:3px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.hero-fill{height:100%;background:var(--theme-accent,#fff);border-radius:3px;transition:width 1.2s var(--ease)}
.hero-members{display:flex;align-items:center;gap:10px;margin-top:12px}
.hav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;border:2px solid rgba(0,0,0,.4);margin-left:-6px;flex-shrink:0;overflow:hidden}
.hav:first-child{margin-left:0}
.hav img{width:100%;height:100%;object-fit:cover}
.hero-mem-info{flex:1;font-size:12px;color:var(--t2)}
.hero-share-btn{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:#fff;background:rgba(255,255,255,.15);padding:5px 12px;border-radius:20px;cursor:pointer;flex-shrink:0;transition:all .18s var(--sp)}
.hero-share-btn:active{background:rgba(255,255,255,.28);transform:scale(.94)}
.hero-share-btn svg{width:13px;height:13px}
.hero-share-btn svg path,.hero-share-btn svg polyline{stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* Weather */
.wx-widget{margin:0 16px 14px;border-radius:var(--r2);background:var(--g1);border:1px solid var(--gb);overflow:hidden;cursor:pointer;transition:all .2s var(--sp)}
.wx-widget:active{transform:scale(.98);background:var(--g2)}
.wx-row{display:flex;align-items:flex-start;gap:12px;padding:12px 14px}
.wx-clothes{padding:8px 14px 12px;border-top:1px solid rgba(255,255,255,.06);display:flex;flex-wrap:wrap;gap:6px}
.wx-pill{font-size:12px;background:rgba(255,255,255,.07);border-radius:10px;padding:3px 9px;white-space:nowrap}

/* Quick actions */
.qa-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.qa{display:flex;flex-direction:column;align-items:center;gap:7px;padding:13px 4px;background:var(--g1);backdrop-filter:var(--gbl);-webkit-backdrop-filter:var(--gbl);border:1px solid var(--gb);border-radius:var(--r2);cursor:pointer;transition:all .18s var(--sp)}
.qa:active{transform:scale(.84);background:var(--g2)}
.qa-icon{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center}
.qa-icon svg{width:20px;height:20px}
.qa-icon svg path,.qa-icon svg circle,.qa-icon svg rect,.qa-icon svg polyline,.qa-icon svg line,.qa-icon svg polygon{stroke:white;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.qa-lbl{font-size:11px;font-weight:500;color:var(--t2);text-align:center}

/* XHS search cards */
.xhs-strip{display:flex;gap:10px;overflow-x:auto;padding:0 16px 4px}
.xhs-strip::-webkit-scrollbar{display:none}
.xhs-card{flex-shrink:0;width:148px;border-radius:var(--r2);overflow:hidden;background:var(--g1);backdrop-filter:var(--gbl);-webkit-backdrop-filter:var(--gbl);border:1px solid var(--gb);cursor:pointer;transition:all .18s var(--sp)}
.xhs-card:active{transform:scale(.93)}
.xhs-card-top{height:70px;background:linear-gradient(135deg,rgba(255,80,80,.15),rgba(255,40,80,.08));display:flex;align-items:center;justify-content:center;gap:6px;border-bottom:1px solid rgba(255,255,255,.06)}
.xhs-card-kw{font-size:13px;font-weight:700;color:rgba(255,120,120,.9)}
.xhs-body{padding:8px 10px 10px}
.xhs-ttl{font-size:12px;font-weight:600;line-height:1.4;margin-bottom:2px}
.xhs-desc{font-size:11px;color:var(--t2);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.xhs-go{font-size:10px;color:rgba(255,80,80,.7);margin-top:4px;font-weight:600}

/* Smart chips */
.smart-strip{display:flex;gap:8px;overflow-x:auto;padding:0 16px 4px}
.smart-strip::-webkit-scrollbar{display:none}
.smart-pill{flex-shrink:0;background:var(--g1);backdrop-filter:var(--gbl);-webkit-backdrop-filter:var(--gbl);border:1px solid var(--gb);border-radius:var(--r2);padding:11px 14px;cursor:pointer;transition:all .18s var(--sp);max-width:210px}
.smart-pill:active{transform:scale(.94)}
.smart-tag{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--t3);margin-bottom:4px}
.smart-ttl{font-size:14px;font-weight:600;margin-bottom:2px}
.smart-desc{font-size:12px;color:var(--t2);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── ITINERARY ──────────────────────────────────── */
.day-tabs{display:flex;gap:6px;overflow-x:auto;padding:6px 16px 10px;flex-shrink:0}
.day-tabs::-webkit-scrollbar{display:none}
.dtab{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:8px 12px;border-radius:var(--r2);background:var(--g1);border:1px solid var(--gb);cursor:pointer;transition:all .2s var(--sp)}
.dtab.on{background:#fff;border-color:transparent}
.dtab:active{transform:scale(.86)}
.dtab-wd{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3)}
.dtab-d{font-size:20px;font-weight:800;color:var(--t1);line-height:1}
.dtab.on .dtab-wd{color:rgba(0,0,0,.5)}.dtab.on .dtab-d{color:#000}
.dtab.today .dtab-d{color:var(--blue)}.dtab.on.today .dtab-d{color:var(--blue)}
.itin-scroll{flex:1;display:flex;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.itin-scroll::-webkit-scrollbar{display:none}
.itin-page{flex:0 0 100%;scroll-snap-align:start;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--tabh)+52px)}
.itin-page::-webkit-scrollbar{display:none}
.day-hdr{padding:10px 16px 8px;display:flex;align-items:center;gap:8px}
.day-hdr-title{font-size:18px;font-weight:700;flex:1;cursor:pointer;transition:opacity .15s}
.day-hdr-title:active{opacity:.6}
.day-hdr-sub{font-size:12px;color:var(--t3);flex-shrink:0}
.act{margin:0 16px 10px;border-radius:var(--r2);background:var(--g1);backdrop-filter:var(--gbl);-webkit-backdrop-filter:var(--gbl);border:1px solid var(--gb);overflow:hidden;transition:transform .18s var(--sp)}
.act:active{transform:scale(.982)}
.act.urgent{border-left:3px solid var(--red)}
.act-row{display:flex;gap:10px;padding:12px;cursor:pointer}
.act-tc{width:44px;flex-shrink:0;padding-top:1px}.act-time{font-size:12px;font-weight:700;color:var(--t2)}
.act-body{flex:1;min-width:0}.act-title{font-size:15px;font-weight:600;margin-bottom:5px;line-height:1.4}
.act-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
.act-chip{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--t2);background:rgba(255,255,255,.05);padding:3px 7px;border-radius:6px}
.act-chip svg{width:10px;height:10px}
.act-chip svg path{stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.act-spend{font-size:13px;font-weight:700;color:var(--orange);margin-top:2px}
.act-note{margin-top:6px;padding:7px 10px;border-radius:0 6px 6px 0;border-left:2px solid rgba(255,159,10,.5);background:rgba(255,159,10,.08);font-size:12px;color:var(--t2);line-height:1.5}
.act-note.urg{border-left-color:rgba(255,69,58,.5);background:rgba(255,69,58,.08);color:rgba(255,120,110,.9)}
.act-ttag{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;background:rgba(10,132,255,.12);border:1px solid rgba(10,132,255,.22);border-radius:8px;font-size:12px;font-weight:600;color:#60B0FF;margin-top:5px}
.act-ttag svg{width:11px;height:11px}
