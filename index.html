<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>旅程</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --primary: #007AFF;
      --primary-rgb: 0,122,255;
      --primary-dim: rgba(0,122,255,0.15);
      --danger: #FF3B30;
      --success: #34C759;
      --warning: #FF9500;
      --purple: #5856D6;
      --bg: #000;
      --surface: rgba(28,28,30,0.82);
      --surface-2: rgba(44,44,46,0.72);
      --surface-3: rgba(58,58,60,0.5);
      --text: #fff;
      --text-2: rgba(255,255,255,0.58);
      --text-3: rgba(255,255,255,0.28);
      --border: rgba(255,255,255,0.1);
      --blur: blur(24px) saturate(180%);
      --r: 18px;
      --r-sm: 12px;
      --spring: cubic-bezier(0.34,1.56,0.64,1);
      --ease: cubic-bezier(0.25,0.46,0.45,0.94);
      --safe-t: env(safe-area-inset-top, 44px);
      --safe-b: env(safe-area-inset-bottom, 34px);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #F2F2F7;
        --surface: rgba(255,255,255,0.85);
        --surface-2: rgba(242,242,247,0.9);
        --surface-3: rgba(209,209,214,0.7);
        --text: #000;
        --text-2: rgba(0,0,0,0.55);
        --text-3: rgba(0,0,0,0.25);
        --border: rgba(0,0,0,0.1);
      }
    }
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }
    html, body {
      height: 100%; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--bg); color: var(--text);
      overscroll-behavior: none;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,122,255,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 85%, rgba(88,86,214,0.12) 0%, transparent 60%);
      pointer-events: none;
    }
    #app {
      position: relative; z-index: 1;
      height: 100%; display: flex; flex-direction: column;
    }

    /* ── VIEW TRANSITIONS ─────────────────────────── */
    .view {
      display: none; flex: 1; flex-direction: column;
      overflow: hidden; position: absolute; inset: 0;
    }
    .view.active { display: flex; animation: vIn .32s var(--ease) both; }
    .view.leaving { animation: vOut .28s var(--ease) both; }
    .view.slide-in { animation: sIn .38s var(--spring) both; }
    .view.slide-out { animation: sOut .3s var(--ease) both; }
    @keyframes vIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
    @keyframes vOut { from{opacity:1;transform:none} to{opacity:0;transform:translateY(-12px)} }
    @keyframes sIn { from{opacity:0;transform:translateX(60px)} to{opacity:1;transform:none} }
    @keyframes sOut { from{opacity:1;transform:none} to{opacity:0;transform:translateX(-40px)} }

    /* ── SCROLL ───────────────────────────────────── */
    .scroller {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(80px + var(--safe-b));
    }
    .scroller::-webkit-scrollbar { display: none; }

    /* ── NAV BAR ──────────────────────────────────── */
    .nav {
      position: sticky; top: 0; z-index: 90;
      padding: calc(var(--safe-t) + 6px) 20px 10px;
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .nav-row { display: flex; align-items: center; justify-content: space-between; }
    .nav-title { font-size: 17px; font-weight: 600; flex: 1; text-align: center; }
    .nav-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--surface-2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .18s var(--spring);
      color: var(--primary);
    }
    .nav-btn:active { transform: scale(.88); background: var(--primary-dim); }
    .nav-large { font-size: 34px; font-weight: 700; letter-spacing: -.5px; padding: 12px 20px 6px; }

    /* ── TAB BAR ──────────────────────────────────── */
    .tabs {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
      display: flex; align-items: flex-start;
      padding: 6px 0 var(--safe-b);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    .tab {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 4px 0; cursor: pointer; transition: all .2s var(--spring);
    }
    .tab svg { width: 26px; height: 26px; transition: transform .22s var(--spring); }
    .tab:active svg { transform: scale(.82); }
    .tab-lbl { font-size: 10px; font-weight: 500; color: var(--text-3); transition: color .2s; }
    .tab.on svg path, .tab.on svg rect, .tab.on svg circle, .tab.on svg polygon { fill: var(--primary); }
    .tab.on .tab-lbl { color: var(--primary); }
    .tab svg path, .tab svg rect, .tab svg circle, .tab svg polygon { fill: var(--text-3); transition: fill .2s; }

    /* ── CARDS ────────────────────────────────────── */
    .card {
      background: var(--surface);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-radius: var(--r);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: transform .2s var(--spring), box-shadow .2s;
    }
    .card.tap:active { transform: scale(.975); }

    /* ── LIST ─────────────────────────────────────── */
    .list { background: var(--surface); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border-radius: var(--r); border: 1px solid var(--border); overflow: hidden; }
    .list-row {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 16px; border-bottom: 1px solid var(--border);
      cursor: pointer; min-height: 48px; transition: background .15s;
    }
    .list-row:last-child { border-bottom: none; }
    .list-row:active { background: var(--surface-2); }
    .list-row-label { flex: 1; font-size: 16px; }
    .list-row-value { font-size: 15px; color: var(--text-2); }
    .list-row-chevron { color: var(--text-3); }

    /* ── BUTTONS ──────────────────────────────────── */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 15px 20px; border-radius: var(--r-sm);
      font-size: 17px; font-weight: 600; cursor: pointer; border: none;
      transition: all .2s var(--spring); font-family: inherit;
    }
    .btn:active { transform: scale(.96); opacity: .85; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-ghost { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-full { width: 100%; }

    /* ── INPUT ────────────────────────────────────── */
    .inp {
      width: 100%; padding: 14px 16px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--r-sm); color: var(--text);
      font-size: 17px; font-family: inherit; outline: none;
      transition: border-color .2s, box-shadow .2s;
      -webkit-appearance: none; appearance: none;
    }
    .inp:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(var(--primary-rgb),.15); }
    .inp::placeholder { color: var(--text-3); }
    .inp-label { font-size: 13px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; letter-spacing: .3px; }

    /* ── SECTION ──────────────────────────────────── */
    .sec { padding: 0 20px; margin-bottom: 24px; }
    .sec-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--text-2); margin-bottom: 10px; padding-left: 2px; }

    /* ── BADGE / CHIP ─────────────────────────────── */
    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge-blue { background: rgba(0,122,255,.14); color: #007AFF; }
    .badge-green { background: rgba(52,199,89,.14); color: #34C759; }
    .badge-orange { background: rgba(255,149,0,.14); color: #FF9500; }
    .badge-red { background: rgba(255,59,48,.14); color: #FF3B30; }
    .badge-purple { background: rgba(88,86,214,.14); color: #5856D6; }

    .chip {
      padding: 6px 14px; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 20px; font-size: 13px; font-weight: 500;
      cursor: pointer; color: var(--text); transition: all .2s var(--spring);
    }
    .chip.on { background: var(--primary); border-color: var(--primary); color: #fff; }
    .chip:active { transform: scale(.92); }

    /* ── MODAL ────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 500;
      display: flex; align-items: flex-end; justify-content: center;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      animation: overlayIn .22s ease both;
    }
    @keyframes overlayIn { from{opacity:0} to{opacity:1} }
    .sheet {
      width: 100%; max-width: 540px;
      background: var(--surface); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      border-radius: var(--r) var(--r) 0 0; border: 1px solid var(--border); border-bottom: none;
      padding: 16px 20px calc(var(--safe-b) + 20px);
      animation: sheetUp .38s var(--spring) both;
      max-height: 92vh; overflow-y: auto;
    }
    .sheet::-webkit-scrollbar { display: none; }
    @keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .sheet-handle { width: 36px; height: 5px; background: var(--text-3); border-radius: 3px; margin: 0 auto 20px; }

    /* ── ONBOARDING ───────────────────────────────── */
    #view-onboarding {
      min-height: 100dvh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: calc(var(--safe-t) + 40px) 32px calc(var(--safe-b) + 40px);
      gap: 0;
    }
    .ob-logo {
      width: 96px; height: 96px; border-radius: 24px;
      background: linear-gradient(145deg, #007AFF 0%, #5856D6 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 24px 64px rgba(0,122,255,.45);
      animation: logoFloat 3s ease-in-out infinite;
      margin-bottom: 28px;
    }
    @keyframes logoFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .ob-title { font-size: 36px; font-weight: 700; letter-spacing: -1px; margin-bottom: 6px; }
    .ob-sub { font-size: 17px; color: var(--text-2); margin-bottom: 48px; text-align: center; }
    .ob-form { width: 100%; display: flex; flex-direction: column; gap: 14px; }
    .code-input {
      width: 100%; padding: 16px; text-align: center;
      font-size: 28px; font-weight: 700; letter-spacing: 8px;
      text-transform: uppercase; background: var(--surface);
      border: 2px solid var(--border); border-radius: var(--r);
      color: var(--text); outline: none; font-family: inherit;
      -webkit-appearance: none; appearance: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .code-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(var(--primary-rgb),.15); }
    .ob-divider { display: flex; align-items: center; gap: 12px; color: var(--text-3); font-size: 14px; }
    .ob-divider::before, .ob-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── HOME ─────────────────────────────────────── */
    .today-banner {
      margin: 0 20px 16px;
      background: linear-gradient(135deg, rgba(0,122,255,.2) 0%, rgba(88,86,214,.15) 100%);
      border: 1px solid rgba(0,122,255,.28);
      border-radius: var(--r); padding: 16px;
    }
    .today-date { font-size: 13px; font-weight: 600; color: var(--primary); margin-bottom: 4px; }
    .today-title { font-size: 22px; font-weight: 700; letter-spacing: -.3px; }
    .today-sub { font-size: 14px; color: var(--text-2); margin-top: 2px; }

    .quick-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
    .qa-btn {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 12px 4px; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-sm); cursor: pointer;
      transition: all .2s var(--spring); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    }
    .qa-btn:active { transform: scale(.9); background: var(--primary-dim); border-color: rgba(var(--primary-rgb),.3); }
    .qa-btn svg { width: 28px; height: 28px; }
    .qa-btn svg path, .qa-btn svg rect, .qa-btn svg circle { fill: var(--primary); }
    .qa-label { font-size: 11px; font-weight: 500; color: var(--text-2); }

    /* Rec cards */
    .rec-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 14px; margin-bottom: 10px;
      cursor: pointer; transition: all .2s var(--spring);
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    }
    .rec-card:active { transform: scale(.98); }
    .rec-type { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--primary); margin-bottom: 5px; }
    .rec-title { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
    .rec-desc { font-size: 13px; color: var(--text-2); line-height: 1.55; }

    /* ── ITINERARY ────────────────────────────────── */
    .day-card {
      background: var(--surface); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      border-radius: var(--r); border: 1px solid var(--border);
      overflow: hidden; margin-bottom: 14px;
    }
    .day-hdr {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; cursor: pointer; transition: background .15s;
      user-select: none;
    }
    .day-hdr:active { background: var(--surface-2); }
    .day-badge {
      width: 50px; height: 50px; border-radius: 14px; flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: var(--primary);
    }
    .day-badge.today { background: var(--danger); }
    .day-badge.past { background: var(--surface-3); }
    .day-badge-mo { font-size: 10px; font-weight: 700; color: rgba(255,255,255,.75); }
    .day-badge-d { font-size: 22px; font-weight: 800; color: #fff; line-height: 1; }
    .day-info { flex: 1; min-width: 0; }
    .day-wkd { font-size: 12px; color: var(--text-2); font-weight: 500; }
    .day-ttl { font-size: 16px; font-weight: 700; }
    .day-prev { font-size: 12px; color: var(--text-3); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .day-chev { transition: transform .3s var(--spring); flex-shrink: 0; }
    .day-chev.open { transform: rotate(90deg); }
    .day-items { display: none; padding: 0 12px 12px; flex-direction: column; gap: 8px; }
    .day-items.open { display: flex; animation: expandDn .28s var(--ease) both; }
    @keyframes expandDn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:none} }

    /* Activity */
    .act {
      background: var(--surface-2); border-radius: 14px; padding: 12px;
      display: flex; gap: 10px; transition: all .18s var(--spring); cursor: pointer;
    }
    .act:active { transform: scale(.984); background: var(--surface-3); }
    .act.urgent { border-left: 3px solid var(--danger); }
    .act-time-col { width: 52px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .act-time { font-size: 12px; font-weight: 700; color: var(--text); text-align: center; }
    .act-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); flex-shrink: 0; }
    .act.urgent .act-dot { background: var(--danger); }
    .act-body { flex: 1; min-width: 0; }
    .act-title { font-size: 15px; font-weight: 600; line-height: 1.4; margin-bottom: 6px; }
    .act-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
    .act-chip {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11.5px; color: var(--text-2); background: var(--surface-3);
      padding: 3px 8px; border-radius: 7px;
    }
    .act-chip svg { width: 11px; height: 11px; }
    .act-chip svg path { fill: var(--text-2); }
    .spend { font-size: 13px; font-weight: 700; color: var(--warning); }
    .act-note { font-size: 12px; color: var(--text-2); padding: 6px 10px; background: rgba(255,149,0,.09); border-radius: 8px; border-left: 3px solid var(--warning); margin-top: 5px; line-height: 1.5; }
    .transport-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px; background: rgba(var(--primary-rgb),.13); border: 1px solid rgba(var(--primary-rgb),.25);
      border-radius: 9px; font-size: 12px; font-weight: 600; color: var(--primary); margin-top: 5px;
    }
    .transport-pill svg path { fill: var(--primary); }
    .app-btns { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .app-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 10px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; font-size: 12px; font-weight: 500; color: var(--text);
      cursor: pointer; transition: all .18s var(--spring);
    }
    .app-btn svg { width: 13px; height: 13px; }
    .app-btn svg path { fill: var(--primary); }
    .app-btn:active { transform: scale(.9); background: var(--primary-dim); border-color: rgba(var(--primary-rgb),.35); color: var(--primary); }

    /* ── EXPENSES ─────────────────────────────────── */
    .exp-summary { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: var(--border); border-radius: var(--r); overflow: hidden; border: 1px solid var(--border); margin-bottom: 16px; }
    .exp-stat { background: var(--surface); padding: 14px 10px; text-align: center; backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); }
    .exp-stat-lbl { font-size: 11px; color: var(--text-2); font-weight: 500; margin-bottom: 4px; }
    .exp-stat-val { font-size: 22px; font-weight: 800; letter-spacing: -.5px; }
    .exp-item {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .15s;
    }
    .exp-item:last-child { border-bottom: none; }
    .exp-item:active { background: var(--surface-2); }
    .exp-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .exp-icon svg path { fill: #fff; }
    .exp-details { flex: 1; min-width: 0; }
    .exp-name { font-size: 15px; font-weight: 600; }
    .exp-sub { font-size: 13px; color: var(--text-2); }
    .exp-amt { font-size: 17px; font-weight: 700; }
    .settle-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .settle-row:last-child { border-bottom: none; }
    .settle-from { font-size: 15px; font-weight: 600; }
    .settle-to { font-size: 13px; color: var(--text-2); }
    .settle-amt { font-size: 16px; font-weight: 700; color: var(--primary); }

    /* ── AI CHAT ──────────────────────────────────── */
    #view-chat { display: none; }
    #view-chat.active { display: flex; flex-direction: column; }
    .chat-body { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; }
    .chat-body::-webkit-scrollbar { display: none; }
    .msg { max-width: 82%; animation: msgIn .3s var(--spring) both; }
    @keyframes msgIn { from{opacity:0;transform:translateY(10px) scale(.94)} to{opacity:1;transform:none} }
    .msg-user { align-self: flex-end; }
    .msg-ai { align-self: flex-start; }
    .msg-bubble { padding: 11px 15px; border-radius: 20px; font-size: 15px; line-height: 1.55; }
    .msg-user .msg-bubble { background: var(--primary); color: #fff; border-bottom-right-radius: 5px; }
    .msg-ai .msg-bubble { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 5px; }
    .msg-meta { font-size: 11px; color: var(--text-3); margin-top: 4px; padding: 0 4px; }
    .msg-user .msg-meta { text-align: right; }
    .typing { align-self: flex-start; }
    .typing-dots { display: flex; gap: 4px; padding: 13px 16px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 20px; border-bottom-left-radius: 5px; width: fit-content; }
    .typing-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-2); animation: td 1.1s ease infinite; }
    .typing-dot:nth-child(2){animation-delay:.18s}.typing-dot:nth-child(3){animation-delay:.36s}
    @keyframes td { 0%,100%{transform:scale(.8);opacity:.4} 50%{transform:scale(1.2);opacity:1} }
    .chat-bar { padding: 10px 16px calc(var(--safe-b) + 10px); background: var(--surface); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; }
    .chat-inp { flex: 1; padding: 10px 14px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 22px; color: var(--text); font-size: 15px; font-family: inherit; outline: none; resize: none; max-height: 120px; overflow-y: auto; transition: border-color .2s; -webkit-appearance: none; }
    .chat-inp:focus { border-color: var(--primary); }
    .chat-send { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .2s var(--spring); }
    .chat-send:active { transform: scale(.86); }
    .chat-send:disabled { background: var(--surface-3); pointer-events: none; }
    .chat-send svg path { fill: #fff; }
    .chat-suggest { display: flex; gap: 8px; overflow-x: auto; padding: 0 16px 10px; }
    .chat-suggest::-webkit-scrollbar { display: none; }
    .suggest-pill { padding: 7px 14px; background: var(--primary-dim); border: 1px solid rgba(var(--primary-rgb),.25); border-radius: 20px; font-size: 13px; font-weight: 500; color: var(--primary); white-space: nowrap; cursor: pointer; flex-shrink: 0; transition: all .18s var(--spring); }
    .suggest-pill:active { transform: scale(.92); background: var(--primary); color: #fff; }

    /* ── SETTINGS ─────────────────────────────────── */
    .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; color: #fff; }
    .you-badge { background: var(--primary-dim); color: var(--primary); font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 10px; }
    .toggle { position: relative; width: 51px; height: 31px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .t-slider { position: absolute; inset: 0; background: var(--surface-3); border-radius: 31px; transition: background .3s; cursor: pointer; }
    .t-slider::before { content: ''; position: absolute; left: 2px; top: 2px; width: 27px; height: 27px; border-radius: 50%; background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,.3); transition: transform .3s var(--spring); }
    input:checked + .t-slider { background: var(--success); }
    input:checked + .t-slider::before { transform: translateX(20px); }
    .code-display { font-size: 34px; font-weight: 800; letter-spacing: 8px; text-align: center; color: var(--primary); padding: 20px; background: var(--primary-dim); border-radius: var(--r); border: 1px solid rgba(var(--primary-rgb),.28); }

    /* ── FAB ──────────────────────────────────────── */
    .fab {
      position: fixed; z-index: 150;
      bottom: calc(72px + var(--safe-b) + 16px); right: 20px;
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--primary); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 28px rgba(var(--primary-rgb),.5);
      transition: all .22s var(--spring);
    }
    .fab:active { transform: scale(.86); box-shadow: 0 4px 14px rgba(var(--primary-rgb),.35); }
    .fab svg path { fill: #fff; }
    .fab-menu { position: fixed; z-index: 149; bottom: calc(72px + var(--safe-b) + 84px); right: 20px; display: flex; flex-direction: column; gap: 10px; }
    .fab-item { display: flex; align-items: center; gap: 10px; justify-content: flex-end; animation: fIn .3s var(--spring) both; opacity: 0; }
    @keyframes fIn { from{opacity:0;transform:translateY(12px) scale(.88)} to{opacity:1;transform:none} }
    .fab-item-lbl { background: var(--surface); border: 1px solid var(--border); padding: 6px 13px; border-radius: 20px; font-size: 13px; font-weight: 500; backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); white-space: nowrap; }
    .fab-item-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); transition: all .2s var(--spring); }
    .fab-item-btn:active { transform: scale(.87); }
    .fab-item-btn svg path { fill: var(--text); }

    /* ── NOTIFICATION BANNER ──────────────────────── */
    .notif-banner {
      position: fixed; top: calc(var(--safe-t) + 8px); left: 14px; right: 14px; z-index: 999;
      background: var(--surface); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border); border-radius: var(--r); padding: 13px 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,.45); cursor: pointer;
      animation: nDrop .38s var(--spring) both;
    }
    @keyframes nDrop { from{opacity:0;transform:translateY(-100%) scale(.95)} to{opacity:1;transform:none} }
    .notif-banner.hide { animation: nUp .28s var(--ease) both; }
    @keyframes nUp { from{opacity:1;transform:none} to{opacity:0;transform:translateY(-100%)} }
    .notif-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .notif-icon { width: 22px; height: 22px; border-radius: 6px; background: var(--primary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .notif-icon svg { width: 13px; height: 13px; }
    .notif-icon svg path { fill: #fff; }
    .notif-app { font-size: 12px; font-weight: 700; color: var(--text-2); }
    .notif-time { font-size: 12px; color: var(--text-3); margin-left: auto; }
    .notif-title { font-size: 14px; font-weight: 700; }
    .notif-body { font-size: 13px; color: var(--text-2); margin-top: 2px; line-height: 1.45; }

    /* ── MISC ─────────────────────────────────────── */
    .divider { height: 1px; background: var(--border); margin: 8px 0; }
    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 30px; gap: 12px; text-align: center; }
    .empty svg { width: 60px; height: 60px; opacity: .25; }
    .empty svg path { fill: var(--text); }
    .empty-ttl { font-size: 17px; font-weight: 600; }
    .empty-sub { font-size: 15px; color: var(--text-2); }
    .progress { height: 4px; background: var(--surface-3); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width .6s var(--ease); }
    .pill-tabs { display: flex; gap: 6px; padding: 4px; background: var(--surface-2); border-radius: 12px; border: 1px solid var(--border); }
    .pill-tab { flex: 1; padding: 8px; border-radius: 9px; font-size: 14px; font-weight: 500; text-align: center; cursor: pointer; color: var(--text-2); transition: all .22s var(--spring); }
    .pill-tab.on { background: var(--primary); color: #fff; box-shadow: 0 2px 10px rgba(var(--primary-rgb),.4); }
    .loading-spin { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .skeleton { background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

    /* Pinch/swipe hint */
    @media (max-width: 390px) { .nav-large { font-size: 28px; } }
  </style>
</head>

    <!-- JS renders everything -->
  </div>
